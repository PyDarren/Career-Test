{% comment %}
    6 点刻度选择器组件 (Scale Selector)
    用于测评答题页，提供 1-6 的程度选择
    左侧 A (紫色) → 右侧 B (青色)，渐变过渡
    模板变量:
      - text_a: A 选项文本
      - text_b: B 选项文本
      - name: 表单字段名 (默认 "scale")
{% endcomment %}

<div class="scale-container" data-scale-selector>
    <div class="scale-labels">
        <span class="scale-label scale-label-a">{{ text_a|default:"选项 A" }}</span>
        <span class="scale-label scale-label-b">{{ text_b|default:"选项 B" }}</span>
    </div>

    <div class="scale-dots" role="radiogroup" aria-label="程度选择">
        <button class="scale-dot pos-1"
                data-value="1"
                role="radio"
                aria-checked="false"
                aria-label="非常同意 A"
                title="非常同意 A"></button>
        <button class="scale-dot pos-2"
                data-value="2"
                role="radio"
                aria-checked="false"
                aria-label="同意 A"
                title="同意 A"></button>
        <button class="scale-dot pos-3"
                data-value="3"
                role="radio"
                aria-checked="false"
                aria-label="轻微同意 A"
                title="轻微同意 A"></button>
        <button class="scale-dot pos-4"
                data-value="4"
                role="radio"
                aria-checked="false"
                aria-label="轻微同意 B"
                title="轻微同意 B"></button>
        <button class="scale-dot pos-5"
                data-value="5"
                role="radio"
                aria-checked="false"
                aria-label="同意 B"
                title="同意 B"></button>
        <button class="scale-dot pos-6"
                data-value="6"
                role="radio"
                aria-checked="false"
                aria-label="非常同意 B"
                title="非常同意 B"></button>
    </div>

    <div class="scale-hint">
        <span>← {{ text_a|default:"A" }}</span>
        <span>{{ text_b|default:"B" }} →</span>
    </div>

    <input type="hidden" name="{{ name|default:'scale' }}" value="" data-scale-input>
</div>
