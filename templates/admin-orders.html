<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单管理 — 画己职测 后台</title>

    <link rel="stylesheet" href="assets/css/admin-orders.css" />
    <link rel="stylesheet" crossorigin href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,440..770;1,440..770&display=swap">
    <link rel="stylesheet" crossorigin href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,700..800;1,700..800&display=swap">
    <link rel="stylesheet" crossorigin href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
    <link rel="icon" type="image/png" href="assets/images/职业测评 LOGO 透明.png">
</head>
<body class="admin-body">

    <div class="admin-layout">

        <!-- ============== 顶部导航栏 ============== -->
        <header class="admin-topbar">
            <div class="admin-topbar__left">
                <div class="admin-logo">
                    <img src="assets/images/职业测评 LOGO 透明.png" width="32" height="32" alt="画己职测 Logo" style="object-fit:cover;flex-shrink:0;">
                    <span class="admin-logo__text">画己职测 <em>后台管理</em></span>
                </div>
            </div>
            <div class="admin-topbar__right">
                <div class="admin-topbar__role">
                    <span class="role-badge role-badge--finance">财务</span>
                </div>
                <div class="admin-user">
                    <div class="admin-user__avatar admin-user__avatar--blue">王</div>
                    <div class="admin-user__info">
                        <span class="admin-user__name">王财务</span>
                        <span class="admin-user__email">finance@huajizhice.cn</span>
                    </div>
                </div>
                <button class="admin-topbar__btn" id="logoutBtn" title="退出登录">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="admin-body__wrapper">

            <!-- ============== 左侧菜单栏 ============== -->
            <aside class="admin-sidebar" id="adminSidebar">
                <nav class="admin-menu">
                    <a class="admin-menu__item" data-page="questions">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                        <span>题库管理</span>
                    </a>
                    <a class="admin-menu__item admin-menu__item--active" data-page="orders">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
                        <span>订单管理</span>
                    </a>
                    <a class="admin-menu__item" data-page="dashboard">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                        <span>数据看板</span>
                    </a>
                    <a class="admin-menu__item" data-page="content">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
                        <span>内容配置</span>
                    </a>
                </nav>
                <div class="admin-sidebar__footer">
                    <div class="version-info">
                        <span class="version-info__label">系统版本</span>
                        <span class="version-info__value">v4.2.1</span>
                    </div>
                    <div class="sync-info" id="syncInfo">
                        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#5ea67e" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        <span>数据同步：刚刚</span>
                    </div>
                </div>
            </aside>

            <!-- ============== 主内容区 ============== -->
            <main class="admin-content">

                <!-- 面包屑 & 标题 -->
                <div class="admin-page-header">
                    <div class="admin-breadcrumb">
                        <span>后台管理</span>
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#b2bec3" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        <span class="admin-breadcrumb--current">订单管理</span>
                    </div>
                    <h1 class="admin-page-title">订单管理</h1>
                </div>

                <!-- 统计概览 -->
                <div class="stat-cards">
                    <div class="stat-card">
                        <div class="stat-card__icon stat-card__icon--purple">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                        </div>
                        <div class="stat-card__body">
                            <span class="stat-card__value" id="statTotalOrders">0</span>
                            <span class="stat-card__label">总订单数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__icon stat-card__icon--green">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </div>
                        <div class="stat-card__body">
                            <span class="stat-card__value" id="statTotalAmount">¥0.00</span>
                            <span class="stat-card__label">总交易金额</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__icon stat-card__icon--blue">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        </div>
                        <div class="stat-card__body">
                            <span class="stat-card__value" id="statSuccessRate">0%</span>
                            <span class="stat-card__label">支付成功率</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__icon stat-card__icon--gold">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        </div>
                        <div class="stat-card__body">
                            <span class="stat-card__value" id="statRefundAmount">¥0.00</span>
                            <span class="stat-card__label">退款总额</span>
                        </div>
                    </div>
                </div>

                <!-- 筛选条件区 -->
                <div class="filter-panel">
                    <div class="filter-panel__row">
                        <div class="filter-field">
                            <label class="filter-field__label">时间范围</label>
                            <div class="filter-field__range">
                                <input type="date" class="filter-input filter-input--date" id="dateStart" value="2026-07-01">
                                <span class="filter-field__separator">至</span>
                                <input type="date" class="filter-input filter-input--date" id="dateEnd" value="2026-07-12">
                            </div>
                        </div>
                        <div class="filter-field">
                            <label class="filter-field__label">订单状态</label>
                            <select class="filter-select" id="filterStatus">
                                <option value="">全部状态</option>
                                <option value="paid">已支付</option>
                                <option value="pending">待支付</option>
                                <option value="refunding">退款中</option>
                                <option value="refunded">已退款</option>
                                <option value="failed">支付失败</option>
                            </select>
                        </div>
                        <div class="filter-field">
                            <label class="filter-field__label">金额区间</label>
                            <div class="filter-field__range">
                                <input type="number" class="filter-input filter-input--amount" id="amountMin" placeholder="最低" min="0" step="0.01">
                                <span class="filter-field__separator">—</span>
                                <input type="number" class="filter-input filter-input--amount" id="amountMax" placeholder="最高" min="0" step="0.01">
                            </div>
                        </div>
                        <div class="filter-field filter-field--grow">
                            <label class="filter-field__label">商户订单号</label>
                            <div class="filter-field__search">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#9B9BAB" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                <input type="text" class="filter-input filter-input--search" id="searchOrderNo" placeholder="输入商户订单号精确搜索...">
                            </div>
                        </div>
                    </div>
                    <div class="filter-panel__actions">
                        <button class="btn btn--primary btn--sm" id="searchBtn">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            查询
                        </button>
                        <button class="btn btn--ghost btn--sm" id="resetBtn">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                            重置
                        </button>
                        <div class="filter-panel__actions-right">
                            <button class="btn btn--ghost btn--sm" id="exportCsvBtn">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                导出 CSV
                            </button>
                            <button class="btn btn--ghost btn--sm" id="exportPdfBtn">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                导出 PDF
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 订单数据表格 -->
                <div class="table-wrapper">
                    <table class="data-table" id="orderTable">
                        <thead>
                            <tr>
                                <th class="col-check"><input type="checkbox" id="selectAll"></th>
                                <th class="col-order-no">商户订单号</th>
                                <th class="col-time">下单时间</th>
                                <th class="col-amount">金额</th>
                                <th class="col-product">商品名称</th>
                                <th class="col-status">状态</th>
                                <th class="col-txn">交易号</th>
                                <th class="col-actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 由 JS 渲染 -->
                        </tbody>
                    </table>
                </div>

                <!-- 分页 -->
                <div class="pagination">
                    <span class="pagination__info" id="paginationInfo">共 0 条</span>
                    <div class="pagination__controls">
                        <button class="pagination__btn" id="prevPage" disabled>
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <span class="pagination__pages" id="paginationPages"></span>
                        <button class="pagination__btn" id="nextPage">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                    <select class="pagination__size" id="pageSizeSelect">
                        <option value="10">10 条/页</option>
                        <option value="20">20 条/页</option>
                        <option value="50">50 条/页</option>
                    </select>
                </div>

            </main>
        </div>

        <!-- ============== 订单详情弹窗 ============== -->
        <div class="modal" id="detailModal">
            <div class="modal__overlay" id="detailOverlay"></div>
            <div class="modal__panel modal__panel--lg">
                <div class="modal__header">
                    <h3 class="modal__title">订单详情</h3>
                    <button class="modal__close" id="detailClose">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal__body" id="detailBody">
                    <!-- 由 JS 渲染 -->
                </div>
                <div class="modal__footer">
                    <button class="btn btn--ghost" id="detailCloseBtn">关闭</button>
                    <button class="btn btn--primary" id="detailExportBtn">导出此订单</button>
                </div>
            </div>
        </div>

        <!-- ============== 签名确认弹窗 ============== -->
        <div class="modal" id="signatureModal">
            <div class="modal__overlay" id="signatureOverlay"></div>
            <div class="modal__panel">
                <div class="modal__icon modal__icon--success">
                    <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#5ea67e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h3 class="modal__title">导出文件已签名</h3>
                <p class="modal__desc" id="signatureDesc">文件已添加数字签名，可用于验证完整性</p>
                <div class="signature-info" id="signatureInfo">
                    <!-- 由 JS 渲染 -->
                </div>
                <div class="modal__actions">
                    <button class="btn btn--primary" id="signatureConfirm">知道了</button>
                </div>
            </div>
        </div>

        <!-- ============== Toast ============== -->
        <div class="admin-toast" id="adminToast"></div>

    </div>

    <script src="assets/js/admin-orders.js"></script>
</body>
</html>
