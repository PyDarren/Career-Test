<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据看板 — 画己职测 后台</title>

    <link rel="stylesheet" href="assets/css/admin-dashboard.css" />
    <link rel="stylesheet" crossorigin href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,440..770;1,440..770&display=swap">
    <link rel="stylesheet" crossorigin href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,700..800;1,700..800&display=swap">
    <link rel="stylesheet" crossorigin href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
    <link rel="icon" type="image/png" href="assets/images/职业测评 LOGO 透明.png">
</head>
<body class="admin-body">

    <div class="admin-layout">

        <!-- ============== 顶部导航栏 ============== -->
        <header class="admin-topbar">
            <div class="admin-topbar__left">
                <div class="admin-logo">
                    <img src="assets/images/职业测评 LOGO 透明.png" width="32" height="32" alt="画己职测 Logo" style="object-fit:cover;flex-shrink:0;">
                    <span class="admin-logo__text">画己职测 <em>后台管理</em></span>
                </div>
            </div>
            <div class="admin-topbar__right">
                <div class="admin-topbar__role">
                    <span class="role-badge role-badge--pm">产品</span>
                </div>
                <div class="admin-user">
                    <div class="admin-user__avatar admin-user__avatar--purple">李</div>
                    <div class="admin-user__info">
                        <span class="admin-user__name">李产品</span>
                        <span class="admin-user__email">pm@huajizhice.cn</span>
                    </div>
                </div>
                <button class="admin-topbar__btn" id="logoutBtn" title="退出登录">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="admin-body__wrapper">

            <!-- ============== 左侧菜单栏 ============== -->
            <aside class="admin-sidebar" id="adminSidebar">
                <nav class="admin-menu">
                    <a class="admin-menu__item" data-page="questions">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                        <span>题库管理</span>
                    </a>
                    <a class="admin-menu__item" data-page="orders">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
                        <span>订单管理</span>
                    </a>
                    <a class="admin-menu__item admin-menu__item--active" data-page="dashboard">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                        <span>数据看板</span>
                    </a>
                    <a class="admin-menu__item" data-page="content">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
                        <span>内容配置</span>
                    </a>
                </nav>
                <div class="admin-sidebar__footer">
                    <div class="version-info">
                        <span class="version-info__label">系统版本</span>
                        <span class="version-info__value">v4.2.1</span>
                    </div>
                    <div class="sync-info" id="syncInfo">
                        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="#5ea67e" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        <span>图表刷新：刚刚</span>
                    </div>
                </div>
            </aside>

            <!-- ============== 主内容区 ============== -->
            <main class="admin-content">

                <!-- 面包屑 & 标题 -->
                <div class="admin-page-header">
                    <div class="admin-breadcrumb">
                        <span>后台管理</span>
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#b2bec3" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                        <span class="admin-breadcrumb--current">数据看板</span>
                    </div>
                    <div class="admin-page-header__row">
                        <h1 class="admin-page-title">数据看板</h1>
                        <div class="admin-page-header__actions">
                            <div class="refresh-indicator" id="refreshIndicator">
                                <span class="refresh-dot"></span>
                                <span class="refresh-text">每小时自动刷新</span>
                            </div>
                            <button class="btn btn--ghost btn--sm" id="screenshotBtn">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                                截图导出
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 时间范围选择器 -->
                <div class="time-range-bar">
                    <div class="time-range-tabs" id="timeRangeTabs">
                        <button class="time-tab" data-range="yesterday">昨日</button>
                        <button class="time-tab time-tab--active" data-range="7d">近 7 日</button>
                        <button class="time-tab" data-range="30d">近 30 日</button>
                        <button class="time-tab" data-range="custom">自定义</button>
                    </div>
                    <div class="time-range-custom" id="timeRangeCustom" style="display:none;">
                        <input type="date" class="filter-input filter-input--date" id="customDateStart" value="2026-07-05">
                        <span class="filter-field__separator">至</span>
                        <input type="date" class="filter-input filter-input--date" id="customDateEnd" value="2026-07-12">
                        <button class="btn btn--primary btn--sm" id="customApplyBtn">应用</button>
                    </div>
                    <div class="time-range-label">
                        当前周期：<strong id="currentRangeLabel">2026-07-06 至 2026-07-12</strong>
                    </div>
                </div>

                <!-- 核心 KPI 卡片区 -->
                <div class="kpi-grid" id="kpiGrid">
                    <!-- 由 JS 渲染 -->
                </div>

                <!-- 趋势图表区 -->
                <div class="chart-row">
                    <div class="chart-card chart-card--2_3">
                        <div class="chart-card__header">
                            <h3 class="chart-card__title">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                                用户活跃趋势
                            </h3>
                            <div class="chart-card__controls">
                                <button class="chart-toggle chart-toggle--active" data-metric="dau">DAU</button>
                                <button class="chart-toggle" data-metric="newUsers">新增用户</button>
                                <button class="chart-toggle" data-metric="completions">完成测评</button>
                            </div>
                        </div>
                        <div class="chart-canvas-wrapper">
                            <canvas id="trendChart" width="720" height="280"></canvas>
                        </div>
                    </div>
                    <div class="chart-card chart-card--1_3">
                        <div class="chart-card__header">
                            <h3 class="chart-card__title">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                                收入分布
                            </h3>
                        </div>
                        <div class="chart-canvas-wrapper chart-canvas-wrapper--sm">
                            <canvas id="barChart" width="280" height="280"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 转化漏斗 + 异常告警 -->
                <div class="chart-row">
                    <div class="chart-card chart-card--1_2">
                        <div class="chart-card__header">
                            <h3 class="chart-card__title">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
                                转化漏斗
                            </h3>
                            <span class="chart-card__hint">访问 → 开始测评 → 完成 → 付费 → 分享</span>
                        </div>
                        <div class="funnel-container" id="funnelContainer">
                            <!-- 由 JS 渲染 -->
                        </div>
                    </div>
                    <div class="chart-card chart-card--1_2">
                        <div class="chart-card__header">
                            <h3 class="chart-card__title">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/></svg>
                                异常告警
                            </h3>
                            <span class="alert-badge" id="alertBadge">3 条告警</span>
                        </div>
                        <div class="alert-list" id="alertList">
                            <!-- 由 JS 渲染 -->
                        </div>
                    </div>
                </div>

            </main>
        </div>

        <!-- ============== 截图导出弹窗 ============== -->
        <div class="modal" id="screenshotModal">
            <div class="modal__overlay" id="screenshotOverlay"></div>
            <div class="modal__panel">
                <div class="modal__icon modal__icon--success">
                    <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#5ea67e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <h3 class="modal__title">截图已生成</h3>
                <p class="modal__desc">数据看板截图已生成，包含当前时间范围的所有图表与 KPI 数据</p>
                <div class="screenshot-preview" id="screenshotPreview">
                    <!-- 由 JS 渲染缩略图 -->
                </div>
                <div class="modal__actions">
                    <button class="btn btn--ghost" id="screenshotClose">关闭</button>
                    <button class="btn btn--primary" id="screenshotDownload">下载图片</button>
                </div>
            </div>
        </div>

        <!-- ============== Toast ============== -->
        <div class="admin-toast" id="adminToast"></div>

    </div>

    <script src="assets/js/admin-dashboard.js"></script>
</body>
</html>
