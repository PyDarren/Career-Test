<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="职探 - 八分钟，看见你的职业性格。免注册、免费测、8分钟出结果的MBTI职业性格测评。">
    <meta name="theme-color" content="#4D3E8C">
    <title>{% block title %}{{ site_name|default:"职探" }} - MBTI职业性格测评{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body data-role="{{ role_group|default:'analyst' }}" data-page="{% block page_type %}{% endblock %}">

    <!-- ============ Header / Nav ============ -->
    <header class="site-header">
        <nav class="nav-bar container">
            <a class="nav-logo" href="{% url 'home' %}">
                <span class="nav-logo-mark" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/>
                        <circle cx="14" cy="14" r="5" fill="currentColor"/>
                    </svg>
                </span>
                <span class="nav-logo-text">{{ site_name|default:"职探" }}</span>
            </a>

            <button class="nav-toggle" aria-label="菜单" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>

            <ul class="nav-links" id="nav-links">
                <li><a href="{% url 'home' %}">首页</a></li>
                <li><a href="{% url 'about' %}">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- ============ Main Content ============ -->
    <main class="site-main" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- ============ Footer ============ -->
    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">{{ site_name|default:"职探" }}</span>
                <p class="footer-slogan">八分钟，看见你的职业性格</p>
            </div>
            <nav class="footer-nav" aria-label="页脚导航">
                <a href="{% url 'home' %}">首页</a>
                <a href="{% url 'about' %}">关于我们</a>
                <a href="{% url 'help' %}">帮助中心</a>
                <a href="{% url 'settings' %}">设置</a>
            </nav>
            <p class="footer-copy">&copy; {% now "Y" %} {{ site_name|default:"职探" }}. 保留所有权利.</p>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
