target-version = "py311"
line-length = 120

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4"]
ignore = ["E501", "B008", "E741", "UP038"]

[lint.isort]
known-first-party = ["common", "assessment", "personality", "careers", "payment", "stats", "career_test"]

[format]
quote-style = "double"
indent-style = "space"
