# 画己职测 — Nginx 反向代理配置
#
# 品牌：画己职测
# 域名：huajizhice.com（占位域名，替换为实际域名）
# 架构：客户端 → Nginx (SSL) → Gunicorn (127.0.0.1:8000) → Django
#
# 使用方式：
#   sudo ln -s /var/www/career_test/deploy/nginx/career_test.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/career_test.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ---------------------------------------------------------------------------
# HTTP → HTTPS 重定向（80 端口）
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name huajizhice.com;

    # 全部重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS 主服务（443 端口）
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name huajizhice.com;

    # --- SSL 证书（占位路径，替换为实际证书路径） ---
    ssl_certificate     /etc/ssl/certs/huajizhice.com.pem;
    ssl_certificate_key /etc/ssl/private/huajizhice.com.key;

    # --- SSL 协议与加密套件 ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- 客户端请求体大小限制（支持报告文件上传） ---
    client_max_body_size 10M;

    # --- 安全响应头 ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- 日志 ---
    access_log /var/log/nginx/career_test_access.log;
    error_log  /var/log/nginx/career_test_error.log;

    # --- 静态文件 ---
    location /static/ {
        alias /var/www/career_test/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- 媒体文件 ---
    location /media/ {
        alias /var/www/career_test/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- 反向代理到 Gunicorn ---
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 代理超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # --- gzip 压缩 ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        text/plain
        text/html
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
